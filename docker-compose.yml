version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: patient_monitoring_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: patient_db
    ports:
      - "3307:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    networks:
      - patient_net

  ai_service:
    build: ./ai-service
    container_name: patient_ai_service
    ports:
      - "8000:8000"
    networks:
      - patient_net
    depends_on:
      - db

  backend:
    build: ./backend
    container_name: patient_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/patient_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - patient_net
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: patient_frontend
    ports:
      - "3000:3000"
    networks:
      - patient_net
    depends_on:
      - backend

networks:
  patient_net:
    driver: bridge

volumes:
  db_data:
