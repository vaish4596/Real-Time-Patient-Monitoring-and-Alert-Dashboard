server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/patient_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Align Hibernate JDBC timestamps with MySQL driver serverTimezone=UTC so naive ISO times from the API are UTC.
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (In production, use an environment variable)
jwt.secret=4f7a9d3e8b1c6f5a2d0b8e7c9f4a1d3b6e2f8c5a0b9d7e4f1a3c6b8d2e5f9a4c
jwt.expiration=86400000

# Enable CORS (for local development with React)
spring.web.cors.allowed-origins=http://localhost:3000
